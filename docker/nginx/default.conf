# ─────────────────────────────────────────────────────────────
# Nginx — Laravel
# Otimizado para servir uma API JSON + endpoints web opcionais
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Raiz pública do Laravel
    root /var/www/html/public;
    index index.php;

    # Charset
    charset utf-8;

    # Tamanho máximo de upload (alinhado com php.ini)
    client_max_body_size 20M;

    # Não logar requisições para favicon e robots
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ─────────────────────────────────────────────────────────
    # Headers de segurança HTTP
    # Em produção com HTTPS, adicione também:
    #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # ─────────────────────────────────────────────────────────
    add_header X-Frame-Options              "SAMEORIGIN" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "geolocation=(), microphone=(), camera=()" always;

    # ─────────────────────────────────────────────────────────
    # Roteamento principal (Laravel front controller)
    # ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─────────────────────────────────────────────────────────
    # PHP-FPM
    # ─────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ─────────────────────────────────────────────────────────
    # Assets estáticos com cache longo
    # ─────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # ─────────────────────────────────────────────────────────
    # Bloquear acesso a arquivos sensíveis
    # ─────────────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(composer\.(json|lock)|package(-lock)?\.json|\.env.*|artisan)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
