; ─────────────────────────────────────────────────────────────
; php.ini — Laravel API Template
;
; Este arquivo serve para os dois cenários:
;   - API pura (Sanctum token-based)
;   - API + Livewire (web + sessão)
;
; Cada seção indica claramente o que se aplica a cada caso.
; ─────────────────────────────────────────────────────────────

[PHP]

; ─────────────────────────────────────────────────────────────
; ERROS — universal
; Em produção: display_errors = Off e LOG_LEVEL=warning no .env
; ─────────────────────────────────────────────────────────────
display_errors         = On
display_startup_errors = On
error_reporting        = E_ALL
log_errors             = On
error_log              = /proc/self/fd/2   ; stdout do Docker (docker logs)


; ─────────────────────────────────────────────────────────────
; LIMITES DE EXECUÇÃO — universal
; Ajuste memory_limit conforme o workload do projeto.
; APIs leves: 128M. Com processamento de arquivos/imagens: 256M+
; ─────────────────────────────────────────────────────────────
memory_limit           = 256M
max_execution_time     = 300
max_input_time         = 300

; upload_max e post_max só importam se houver upload de arquivos.
; Para API JSON pura pode baixar para 2M sem problema.
upload_max_filesize    = 20M
post_max_size          = 25M

; Padrão do PHP é 1000. Formulários grandes (Livewire, tabelas)
; cortam dados silenciosamente acima desse limite.
max_input_vars         = 3000


; ─────────────────────────────────────────────────────────────
; TIMEZONE — universal
; ─────────────────────────────────────────────────────────────
date.timezone          = America/Sao_Paulo


; ─────────────────────────────────────────────────────────────
; SEGURANÇA GERAL — universal (API e Livewire)
; ─────────────────────────────────────────────────────────────

; Esconde o header "X-Powered-By: PHP/8.x" nas respostas HTTP.
; Não faz sentido anunciar a versão para qualquer um no DevTools.
expose_php             = Off


; ─────────────────────────────────────────────────────────────
; SEGURANÇA DE SESSÃO — necessário com Livewire/web
; Para API pura com token (Sanctum) estas linhas não têm efeito
; prático, mas também não causam problema — podem ficar.
; ─────────────────────────────────────────────────────────────

; Impede JavaScript de ler o cookie de sessão (anti-XSS).
session.cookie_httponly = 1

; Bloqueia envio do cookie em requisições cross-site de terceiros.
; "Lax" = envia em navegação normal, bloqueia em POST cross-site.
; Em produção com HTTPS use "Strict" se o frontend for mesmo domínio.
session.cookie_samesite = "Lax"

; Impede que o PHP aceite um session ID vindo de fora (anti-session fixation).
session.use_strict_mode = 1


; ─────────────────────────────────────────────────────────────
; OPCACHE — universal
;
; validate_timestamps = 1  →  dev  (relê arquivo se mudou)
; validate_timestamps = 0  →  prod (nunca relê, máxima performance)
;
; Em produção, após o deploy rodar: php artisan opcache:clear
; ─────────────────────────────────────────────────────────────
[opcache]
opcache.enable                  = 1
opcache.enable_cli              = 0
opcache.memory_consumption      = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 20000
opcache.revalidate_freq         = 0
opcache.validate_timestamps     = 1
opcache.fast_shutdown           = 1

; JIT — ganho real em código CPU-intensivo (transformações, cálculos).
; Para operações I/O (banco, Redis, HTTP externo) o ganho é mínimo
; porque o gargalo não é o PHP. Deixar habilitado não tem custo.
opcache.jit_buffer_size         = 100M
opcache.jit                     = tracing
