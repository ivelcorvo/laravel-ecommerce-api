# ─────────────────────────────────────────────────────────────
# docker-compose.yml — Stack Laravel
#
# Nota: o atributo `version` foi removido propositalmente.
# Está obsoleto no Docker Compose v2+ e gera warning quando
# presente. O Compose moderno usa a especificação mais recente
# automaticamente.
# ─────────────────────────────────────────────────────────────

name: ${APP_SLUG:-laravel}

services:

  # ─────────────────────────────────────────────────────────
  # PHP-FPM (Laravel)
  # ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.4}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: ${APP_SLUG:-laravel}/app:latest
    container_name: ${APP_SLUG:-laravel}_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────
  # Nginx
  # ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_SLUG:-laravel}_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network
    depends_on:
      - app

  # ─────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ${APP_SLUG:-laravel}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-app}
      POSTGRES_USER: ${DB_USERNAME:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    # Em produção, comente a linha `ports` para não expor o
    # banco fora da rede Docker. Em dev é útil para conectar
    # via DBeaver/TablePlus.
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-app} -d ${DB_DATABASE:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────
  # Redis (cache, sessões, filas)
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ${APP_SLUG:-laravel}_redis
    restart: unless-stopped
    # Em produção, comente a linha `ports`.
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network
    command: >
      redis-server
      --appendonly yes
      --requirepass "${REDIS_PASSWORD:-secret}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────
  # Mailpit — captura de email para desenvolvimento
  # Web UI: http://localhost:8025
  # SMTP:   mailpit:1025 (a partir do container app)
  # ─────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: ${APP_SLUG:-laravel}_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - app_network

  # ─────────────────────────────────────────────────────────
  # Queue Worker — Laravel
  # Reutiliza a imagem do serviço `app` (não rebuilda).
  # ─────────────────────────────────────────────────────────
  queue:
    image: ${APP_SLUG:-laravel}/app:latest
    container_name: ${APP_SLUG:-laravel}_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
    networks:
      - app_network
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    # Habilitar apenas quando precisar (docker compose --profile queue up)
    profiles: [queue]

  # ─────────────────────────────────────────────────────────
  # Scheduler — Laravel
  # Loop manual a cada 60s porque não há cron no container.
  # ─────────────────────────────────────────────────────────
  scheduler:
    image: ${APP_SLUG:-laravel}/app:latest
    container_name: ${APP_SLUG:-laravel}_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
    networks:
      - app_network
    depends_on:
      app:
        condition: service_started
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    # Habilitar apenas quando precisar (docker compose --profile scheduler up)
    profiles: [scheduler]

# ─────────────────────────────────────────────────────────────
# Volumes persistentes
# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────────────────────────
# Rede interna
# ─────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
